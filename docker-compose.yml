services:
  api:
    build: ./backend
    container_name: mcpanel_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    networks:
      - mcnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mc_servers:/data/servers

  frontend:
    build: ./frontend
    container_name: mcpanel_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - mcnet

  postgres:
    image: postgres:16
    container_name: mcpanel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcpanel
      POSTGRES_USER: mcpanel
      POSTGRES_PASSWORD: mcpanel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mcnet

  redis:
    image: redis:7
    container_name: mcpanel_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - mcnet

networks:
  mcnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mc_servers:

